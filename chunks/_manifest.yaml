# MyVault visual-system / chunks manifest
# Registry of all asset-type chunks. Parallel to foundations/_manifest.yaml.
#
# Each chunk pins a renderer + spec format and inherits from the foundations layer.
# Update when a new asset-type chunk lands or an existing one ships a major version.

manifest_version: "1.6"
domain: chunks
last_updated: 2026-05-01 (R-COLOR-009 chart-card exception ratified to foundations; Marp promoted to active; ebook output formats narrowed to validated set)
owner: mark
summary: >
  Asset-type chunks define rules for specific deliverable types (ebook, presentation,
  social, chart, email, web component). Each chunk extends the foundations layer
  (color, typography, logo-usage, iconography), pins one renderer per asset type,
  and uses three severity tiers — HARD (universal-within-asset-type), BASE (defaults),
  MENU (kit catalog of layouts to choose from).

  This is the "patterns" layer of the visual-system pipeline. Phase 2 ships the
  renderers in myvault-tools/brand-studio/.

# === ACTIVE CHUNKS ===
chunks:

  - chunk_id: ebook
    file: ebook.md
    status: active
    version: "1.4"
    last_updated: 2026-05-01 (R-EBOOK-001/002 geometry synced to Figma canon)
    asset_type: ebook
    covers_pdf_documents: true
    summary: >
      Ebook + PDF document. 7 HARD rules covering page geometry + inner grid (1-col / 2-col),
      surface-by-category + canonical Icon-left / page-number-right footer, signal-go reservation,
      every-cover-has-a-lockup, mandatory pages, reading order, footnote signal-go semantics.
      BASE typography table per role (Section Opener title and Stat Page hero number are flexible
      defaults, not locks). MENU of 3 cover treatments (covers are an experimental surface — not a
      closed catalog) + 23 interior pages including back-cover (added stat-page-3-teal-mirror in
      v1.1; added 5 editorial-first primitives in v1.3 — section-opener-hero, hero-stats,
      model-grid, takeaways, pull-page — validated in the privacy-guide build).
    hard_rule_count: 7
    hard_rule_ids: [R-EBOOK-001, R-EBOOK-002, R-EBOOK-003, R-EBOOK-004, R-EBOOK-005, R-EBOOK-006, R-EBOOK-007]
    renderer: typst
    spec_format: typ
    template_path_phase_2: brand-studio/templates/ebook/myvault-ebook.typ
    output_formats: [pdf]
    output_formats_unverified: [pdf-a, pdf-ua]  # Typst supports both via flags; not yet validated against an actual deliverable
    visual_canon:
      pageId: "70:8798"
      pageName: "eBooks & Documents"
      reference_examples:
        - { nodeId: "72:9166", what: "canonical interior page footer (Icon-left + page-number-right) on white surface" }
        - { nodeId: "89:6938", what: "dual-stat 2-column composition on Vault Teal with Icon-white footer flip" }
    inherits_from_foundations: [color, typography, logo-usage, iconography]
    review_axes: [ebook-reviewer, color-reviewer, typography-reviewer, brand-element-reviewer, accessibility-reviewer]
    foundation_overrides: []  # No HARD rules from foundations are overridden
    is_authority_for:
      - ebook interior page-type catalog (23 entries under MENU.interior_pages, including back-cover)
      - page-category → surface mapping (with documented dramatic-register override)
      - canonical interior-page footer pattern (Icon-left + page-number-right; variant flips per pairings)
      - inner-grid options for ebook pages (1-column 640 / 2-column 300/40/300)
      - footnote/endnote signal-go semantics
    cover_policy: |
      Covers are intentionally not catalogued as a HARD spec. Three treatments are documented in MENU
      as examples, but new compositions are welcome as long as R-EBOOK-001 (page geometry),
      R-EBOOK-004 (every cover has a lockup), and the foundation rules hold.

  - chunk_id: presentation
    file: presentation.md
    status: active
    version: "1.3"
    last_updated: 2026-05-01 (R-COLOR-009 chart-card exception ratified to foundations; renderer promoted to active)
    asset_type: presentation
    summary: >
      Slide deck rules. 3 HARD rules covering canvas geometry (1920×1080, padding 20/40/20/40,
      vertical auto-layout); no decorative top header bar (text-only deck-name + section-name labels
      allowed); canonical footer shape when chrome is used; and 18-pt text floor (R-TYPE-005
      foundation override). BASE rules cover full typography ladder
      (144 / 72 / 64 / 56 / 48 / 40 / 32 / 28 / 18), surface palette + register guidance
      (white default, off-white rare alternate), Vault Teal discipline with chart-card annotation
      exception inherited from foundations/color.md v1.1, body color on dark surfaces is solid
      white, 70/20/7/3 + max-2-colours, 1/2/3-column grid, card padding, header-label + footer
      Icon-variant pairing per surface, typical deck shape (Cover and Closing as default patterns,
      not contracts). Pattern Reference points at Figma Section 1 (13 prototypes) — study material
      for register, not templates. Two-layer reviewer: Layer 1 rule compliance (automated,
      blocking) + Layer 2 reader experience (judgment-based, advisory).
    hard_rule_count: 3
    hard_rule_ids: [R-PRES-001, R-PRES-002, R-PRES-003]
    renderer: marp
    renderer_status: active
    spec_format: md
    template_path_phase_2: brand-studio/templates/presentation/myvault-presentation/
    output_formats: [pdf, pptx, html]
    visual_canon:
      pageId: "74:9684"
      pageName: "Presentations"
      pattern_reference_sections:
        - { sectionId: "97:8611", sectionName: "Section 1", parentSectionId: "97:7729", parentSectionName: "Title slides", what: "13 finished slide-type prototypes (Slide 09 / Thesis Block through Slide 21 / Ask · Use of Funds) + Mark's draft frames Title-9 through Title-20 (12 ground-truth sketches)" }
      prior_section_removed:
        sectionId: "76:9735"
        sectionName: "Slide Templates"
        note: "Held 8 earlier canonical types (Title, Agenda, Section Divider Light/Dark, Statement, Stat Block, Logo Reveal, Comparison). Deleted from Figma during v3 of the investor-deck test. Section 1 is now the only canonical pattern reference."
    inherits_from_foundations: [color, typography, logo-usage, iconography]
    review_axes: [presentation-reviewer, color-reviewer, typography-reviewer, brand-element-reviewer, accessibility-reviewer]
    foundation_overrides:
      - { rule_id: R-TYPE-005, chunk: typography, nature: raise-floor, from: "14pt practical text floor", to: "18pt presentation text floor", enforced_by: R-PRES-003 }
      # The R-COLOR-009 chart-card exception was ratified into foundations/color.md v1.1 on
      # 2026-05-01 and is now inherited from the foundation rather than declared here.
    is_authority_for:
      - presentation slide canvas + auto-layout structure
      - presentation-asset 18-pt text floor (R-TYPE-005 override)
      - presentation header-label + footer canonical shape and Icon-variant pairing per surface
      - presentation typography ladder (144 / 72 / 64 / 56 / 48 / 40 / 32 / 28 / 18)
      - presentation column system (1-col 1840 / 2-col 900×N / 3-col 587×N, all gap 40)
      - Vault Teal discipline interpretation (sparingly, every instance earns its presence — no closed reservation list; chart-card 18pt scoped exception)
      - body color on dark surfaces (solid white, not opacity-reduced)
    structure_policy: |
      No mandatory deck structure. Per `feedback_no_mandatory_pages_editorial_first`, each deck
      decides what slides it needs based on what serves its audience. Cover and Closing are typical
      default patterns documented in BASE — not contracts. A 4th HARD rule (minimum-viable structure)
      was drafted and removed during initial authoring once that principle landed.
    chrome_policy: |
      Header labels (deck-name left + section-name right, Lato 18 text-only) and footer (icon-left +
      page-number-right, 1840×24 SPACE_BETWEEN) are conditional, not mandatory. Cover, Closing,
      full-bleed editorial slides typically omit one or both. The HARD constraint is the SHAPE of
      header labels and footer when present, plus the universal prohibition on a decorative top
      header bar / strip / fill.

  - chunk_id: chart
    file: chart.md
    status: active
    version: "1.1"
    last_updated: 2026-05-01 (R-COLOR-009 chart-card exception ratified to foundations; chunk foundation_overrides now empty)
    asset_type: chart
    summary: >
      Data-visualization chart deliverables. 7 HARD rules (R-CHART-001..007) covering
      chart-card geometry (cornerRadius 0; 1px gray-01 stroke; 40 padding), no-eyebrow-above-title,
      footer canonical shape (1px top stroke + dot+caption together-LEFT gap 10 — the Figma
      data-property says SPACE_BETWEEN but visual canon shows together-LEFT, visual wins),
      comparative-palette reservation (signal.stop / sky / go for 3-state status comparisons only —
      sequential data uses teal), value-labels-on-every-comparative-segment (color-blind safety),
      Vault Teal at 18pt allowed for chart annotations within chart-card boundary (ratifies the
      scoped R-COLOR-009 exception declared in presentation.md v1.1), and the negative-bar /
      zero-line / dashed-gridline distinction for axis charts. BASE rules cover typography per
      role, surface palette (gradient default; flat off-white; solid teal), per-surface color
      recipes, bar/radial geometry, axis-chart specifics. MENU catalog of 5 canonical types.
      Renderer: Vega-Lite + JSON spec; SVG composer wraps Vega-Lite plot output in chart-card
      chrome (renderers/vega-lite/compose.mjs). 5 fixtures validated end-to-end against Figma
      reference frames on 2026-04-30.
    hard_rule_count: 7
    hard_rule_ids: [R-CHART-001, R-CHART-002, R-CHART-003, R-CHART-004, R-CHART-005, R-CHART-006, R-CHART-007]
    renderer: vega-lite
    spec_format: json
    template_path_phase_2: renderers/vega-lite/
    output_formats: [svg, png, pdf]
    visual_canon:
      pageId: "70:8479"
      pageName: "Diagrams"
      reference_examples:
        - { nodeId: "70:8480", what: "Horizontal Bar Chart on gradient.mist (5 rows)" }
        - { nodeId: "70:8520", what: "Horizontal Bar Chart on gradient.primary (alternate register)" }
        - { nodeId: "70:8617", what: "Vertical Bar Chart on gradient.warm" }
        - { nodeId: "70:8705", what: "Vertical Bar Chart with Axes on flat off-white" }
        - { nodeId: "70:8651", what: "Radial Comparison — Dramatic on solid teal" }
        - { nodeId: "70:8678", what: "Radial Comparison — Light on gradient.greydient" }
    inherits_from_foundations: [color, typography, logo-usage, iconography]
    review_axes: [chart-reviewer, color-reviewer, typography-reviewer, brand-element-reviewer, accessibility-reviewer]
    foundation_overrides: []
    # R-CHART-006 still encodes the chart-side semantics (axis / year / legend / caption labels);
    # the exception itself now lives in foundations/color.md v1.1 R-COLOR-009.
    is_authority_for:
      - chart-card geometry + chrome shape across the visual system
      - comparative palette reservation (signal.stop / sky / go for 3-state status only)
      - value-labels-on-every-comparative-segment color-blind solution
      - chart-annotation scoped Vault Teal exception (ratifies presentation.md v1.1's anticipation)
      - axis-chart treatment (negative bars + zero line + dashed gridlines)
    out_of_scope:
      - { what: "Flow Diagram (Figma 70:8560)", where_to: "future chunks/diagram.md (Typst+Fletcher)" }
      - { what: "Stat Infographic (Figma 70:8598)", where_to: "stat-infographic editorial primitive in renderers/typst/myvault-editorial.typ" }

