# === RENDERER MATRIX ===
renderer_pinning:
  ebook: { renderer: typst, spec_format: typ, phase: 2.0 }
  presentation: { renderer: marp, spec_format: md, phase: 2.1 }
  chart: { renderer: vega-lite, spec_format: json, phase: 2.0, status: shipped, note: "renderers/vega-lite/ active 2026-04-30; SVG composer wraps Vega-Lite plot output in brand chart-card chrome" }
  social: { renderer: satori, spec_format: tsx, phase: 2.2 }
  diagram: { renderer: typst, spec_format: typ, phase: 2.4 }
  email: { renderer: react-email, spec_format: tsx, phase: 3.1 }
  web_component: { renderer: tailwind-v4-react, spec_format: tsx, phase: 3.2 }

# === REVIEWER AGENT ROSTER (asset-type specific) ===
reviewers:
  - id: ebook-reviewer
    consumes: [ebook]
    purpose: "Ebook-specific HARD rule enforcement (R-EBOOK-001..010), MENU/BASE conformance"
    runs_when: deliverable_type in [ebook, pdf-document]

  - id: presentation-reviewer
    consumes: [presentation]
    purpose: "Two-layer review: Layer 1 enforces R-PRES-001..003 + foundation rules (automated, blocking); Layer 2 evaluates reader experience — 3-second test, one-idea test, distance legibility, register match, Vault Teal earns presence, calm-not-loud, brand voice; deck-level arc / cadence / chrome consistency / opening-closing loop (judgment-based, advisory)"
    runs_when: deliverable_type == presentation
    status: contract-defined  # chunk shipped; agent implementation pending

  - id: social-reviewer
    consumes: [social]
    purpose: "Social image + carousel HARD enforcement, platform-aspect compliance"
    runs_when: deliverable_type == social-image
    status: planned

  - id: chart-reviewer
    consumes: [chart]
    purpose: "Chart HARD enforcement (R-CHART-001..007), comparative palette compliance, value-labels-on-comparative-segment color-blind check, axis-chart negative-bar / zero-line / dashed-gridline distinction"
    runs_when: deliverable_type == chart
    status: contract-defined  # chunk shipped; agent implementation pending

  - id: email-reviewer
    consumes: [email]
    purpose: "Email HARD enforcement, client-compatibility, dark-mode"
    runs_when: deliverable_type == email
    status: planned

# === LOAD-FOR-TASK QUICK LOOKUP ===
# Which chunks (foundations + asset-types) to load when generating a deliverable
load_for_task:
  ebook:
    foundations: [color, typography, logo-usage, iconography]
    chunks: [ebook]
    chunks_if_brief_mentions_data_viz: [ebook, chart]
    tokens_filter: [color.*, typography.*, gradient.*, space.*, radius.*]
  pdf_document:
    foundations: [color, typography, logo-usage, iconography]
    chunks: [ebook]  # ebook chunk covers PDF docs
    chunks_if_brief_mentions_data_viz: [ebook, chart]
    tokens_filter: [color.*, typography.*, gradient.*, space.*, radius.*]
  presentation:
    foundations: [color, typography, logo-usage, iconography]
    chunks: [presentation]
    tokens_filter: [color.*, typography.*, gradient.*, space.*]
  social_image:
    foundations: [color, typography, logo-usage, iconography]
    chunks: [social]  # planned
    tokens_filter: [color.*, typography.*, gradient.*, space.*, radius.*]
  chart:
    foundations: [color, typography]
    chunks: [chart]
    tokens_filter: [color.*, typography.*, gradient.*, space.*, radius.*]
  email:
    foundations: [color, typography, logo-usage, iconography]
    chunks: [email]  # planned
    tokens_filter: [color.*, typography.*, space.*]

# === FOUNDATIONS LAYER REFERENCE ===
# This chunks layer extends the foundations layer.
# See foundations/_manifest.yaml for the foundation chunk registry.
foundations_manifest_path: "../foundations/_manifest.yaml"

# === SEVERITY TIER REFERENCE ===
# Asset-type chunks use three tiers — HARD, BASE, MENU.
# Foundations chunks use two tiers — HARD, BASE.
# MENU is unique to asset-type chunks (kit catalog of choose-one alternatives).
severity_tiers:
  HARD:
    enforcement: "reviewer agents reject violations"
    examples: "R-EBOOK-001 page geometry, R-EBOOK-002 surface-by-category"
  BASE:
    enforcement: "default behavior; deviation must be documented in deliverable spec"
    examples: "body Lato 16pt @ 150%, default header alignment"
  MENU:
    enforcement: "no enforcement — pick one"
    examples: "3 cover treatments, 16 page types, variant duplicates"

# === MEMORY CANON THAT INFORMS ALL ASSET-TYPE CHUNKS ===
related_memories:
  universal:
    - feedback_no_mandatory_pages_editorial_first
    - feedback_design_pages_are_guidelines
    - feedback_chunk_size_placement_pins
    - feedback_grid_is_content_specific
    - feedback_white_is_default_surface
    - feedback_hero_color_80_20_black_teal
    - feedback_14pt_practical_text_floor
    - feedback_regular_weight_only
    - feedback_no_uppercase_eyebrows

