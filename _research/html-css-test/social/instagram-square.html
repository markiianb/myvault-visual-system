<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MyVault — Instagram square stat card</title>
  <!-- Reuse the SAME stylesheet as the ebook test. Cross-asset proof. -->
  <link rel="stylesheet" href="../ebook/styles.css">
  <style>
    /* The only social-specific override:
       canvas size is 1080×1080 (Instagram square), not page-sized. */
    @page { size: 1080px 1080px; margin: 0; }
    html, body { width: 1080px; height: 1080px; margin: 0; padding: 0; }
    body { background: var(--c-teal); }

    .social-card {
      width: 1080px;
      height: 1080px;
      padding: 80px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .social-card .lockup {
      width: 200px;
      height: auto;
    }

    .social-card .headline {
      font-family: var(--f-serif);
      font-size: 56px;
      line-height: 1.10;
      color: var(--c-white);
      max-width: 880px;
    }

    .social-card .footer-line {
      font-family: var(--f-sans);
      font-size: 18px;
      letter-spacing: 1px;
      color: var(--c-off-white);
      line-height: 1;
    }

    /* Override hero-stats for dark surface — color flips */
    .social-card .hero-stats {
      background: rgba(255, 255, 255, 0.06);
      width: 920px;
      margin: 40px 0;
    }
    .social-card .hero-stats .label { color: var(--c-off-white); }
    .social-card .hero-stats .stat .value { color: var(--c-white); }
    .social-card .hero-stats .stat .stat-label { color: var(--c-white); }
    .social-card .hero-stats .stat .source { color: var(--c-off-white); opacity: 0.6; }
  </style>
</head>
<body>
  <div class="social-card">
    <img class="lockup" src="../../../assets/logo/lockup-light.svg" alt="MyVault">

    <div>
      <div class="headline">Adoption is universal. Trust is not.</div>

      <!-- THE EXACT SAME .hero-stats COMPONENT MARKUP AS THE EBOOK PAGE 4 -->
      <div class="hero-stats">
        <div class="grid">
          <div class="stat">
            <div class="value">99%</div>
            <div class="stat-label">used AI last week.</div>
            <div class="source">Gallup, 2024.</div>
          </div>
          <div class="stat">
            <div class="value">5%</div>
            <div class="stat-label">trust AI &ldquo;a lot.&rdquo;</div>
            <div class="source">YouGov, 2025.</div>
          </div>
          <div class="stat">
            <div class="value">82%</div>
            <div class="stat-label">left a brand over data.</div>
            <div class="source">Capgemini, 2025.</div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-line">myvaultai.com — Private by design</div>
  </div>
</body>
</html>
